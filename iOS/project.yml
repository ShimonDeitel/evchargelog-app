name: EV Charging Log
options:
  bundleIdPrefix: com.shimondeitel.evchargelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  EV Charging Log:
    type: application
    platform: iOS
    sources:
      - path: EV Charging Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.evchargelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: EV Charging Log/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  EV Charging LogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EV Charging LogTests
      - path: EV Charging Log.storekit
    dependencies:
      - target: EV Charging Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.evchargelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  EV Charging LogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: EV Charging LogUITests
    dependencies:
      - target: EV Charging Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.evchargelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  EV Charging Log:
    build:
      targets:
        EV Charging Log: all
        EV Charging LogTests: [test]
        EV Charging LogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: EV Charging Log.storekit
    test:
      config: Debug
      storeKitConfiguration: EV Charging Log.storekit
      targets:
        - EV Charging LogTests
        - EV Charging LogUITests
    archive:
      config: Release
